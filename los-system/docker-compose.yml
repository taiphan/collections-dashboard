version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: los-postgres
    environment:
      POSTGRES_USER: los_user
      POSTGRES_PASSWORD: los_password
      POSTGRES_DB: los_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U los_user -d los_db']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: los-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: los-backend
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://los_user:los_password@postgres:5432/los_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key-minimum-32-characters-long-here
      CORS_ORIGINS: http://localhost:3000
      LOG_LEVEL: debug
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma

volumes:
  postgres_data:
  redis_data:

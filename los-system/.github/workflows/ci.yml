name: LOS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: los_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: los-system/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: los-system/backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: los-system/backend
        run: npx prisma generate

      - name: Run backend tests
        working-directory: los-system/backend
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/los_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-minimum-32-characters-long
          NODE_ENV: test
        run: npm test

      - name: Install frontend dependencies
        working-directory: los-system/frontend
        run: npm ci

      - name: Build frontend
        working-directory: los-system/frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        working-directory: los-system/backend
        run: docker build -t los-backend:latest .

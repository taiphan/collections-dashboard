services:
  postgres:
    image: postgres:16-alpine
    container_name: lcp-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lcp
      POSTGRES_PASSWORD: lcp
      POSTGRES_DB: lcp
    volumes:
      - lcp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "lcp"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: lcp-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

volumes:
  lcp-postgres-data:
